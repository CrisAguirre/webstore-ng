<div class="container mt-4">
  <div class="row mb-5 text-center">
    <div class="col-12">
      <h1 class="neon-title" style="font-size: 3rem;">Abarrotes CRIS</h1>
      <p class="text-muted fs-5">Los mejores productos disponibles en nuestra sucursal virtual</p>
    </div>
  </div>

  <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
    <!-- Grid Iteration -->
    <div class="col" *ngFor="let producto of productos">
      <div class="card bg-transparent h-100 neon-box p-3 h-100 d-flex flex-column border-0" style="transition: transform 0.3s ease;">
        <div class="text-center mb-3">
          <!-- Placeholder Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="var(--primary-neon)" class="bi bi-box-seam" viewBox="0 0 16 16">
            <path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5l2.404.961L10.404 2zm3.564 1.426L5.596 5 8 5.961 14.154 3.5zm3.25 1.7-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464z"/>
          </svg>
        </div>
        <div class="card-body p-0 d-flex flex-column flex-grow-1">
          <h5 class="card-title text-white fw-bold fs-5 text-center">{{ producto.nombre | uppercase }}</h5>
          <p class="text-center text-muted mb-3" style="font-size: 0.9rem;">Categoría: {{ producto.categoria }}</p>
          <div class="mt-auto text-center">
             <span class="badge" style="background-color: var(--primary-neon); color: var(--bg-card); font-size: 1.2rem; padding: 10px;">{{ producto.precio | currency: 'USD' }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="productos.length === 0" class="text-center text-muted mt-5">
      <h4>No hay productos disponibles por el momento.</h4>
  </div>
</div>
