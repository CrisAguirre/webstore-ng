<!-- Nordic Animated Background -->
<div class="nordic-bg">
  <span class="rune r1">ᚠ</span>
  <span class="rune r2">ᚢ</span>
  <span class="rune r3">ᚦ</span>
  <span class="rune r4">ᚨ</span>
  <span class="rune r5">ᚱ</span>
  <span class="rune r6">ᚲ</span>
  <span class="rune r7">ᚷ</span>
  <span class="rune r8">ᚹ</span>
  <span class="rune r9">ᚺ</span>
  <span class="rune r10">ᚾ</span>
  <span class="rune r11">ᛁ</span>
  <span class="rune r12">ᛃ</span>
</div>

<!-- Navbar Neon -->
<nav class="navbar navbar-expand-lg navbar-dark pb-3 pt-3 mb-4" style="background-color: var(--bg-card); border-bottom: 1px solid white; box-shadow: 0 0 10px rgba(0,243,255,0.8);">
  <div class="container d-flex justify-content-between align-items-center">
    <!-- Brand / Logo -->
    <a class="navbar-brand navbar-brand-neon" routerLink="/">
      <img src="assets/logo.png" alt="Abarrotes Cris Logo" style="height: 40px; border-radius: 5px; box-shadow: 0 0 5px var(--primary-neon);">
      <span class="ms-2" style="color: white; font-weight: bold; text-shadow: 0 0 5px var(--primary-neon);">ABARROTES CRIS</span>
    </a>

    <!-- Menu Links -->
    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 d-flex flex-row gap-4 align-items-center">
      <li class="nav-item">
        <a class="nav-link text-white" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Tienda</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a>
      </li>
      <li class="nav-item" *ngIf="!authService.isLoggedIn()">
        <a class="neon-btn text-decoration-none" routerLink="/login" routerLinkActive="active">Login Admin</a>
      </li>
    </ul>
  </div>
</nav>

<!-- Content -->
<div class="container main-content">
  <router-outlet></router-outlet>
</div>

<!-- Floating Logout Button -->
<div *ngIf="authService.isLoggedIn()" style="position: fixed; bottom: 20px; left: 20px; z-index: 1000;">
  <a class="neon-btn text-decoration-none" style="cursor:pointer; padding: 5px 12px; font-size: 0.8rem; border: 1px solid white;" (click)="authService.logout()">Cerrar Sesión</a>
</div>
